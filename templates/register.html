<!DOCTYPE html>
<html>
<head>
    <title>Register - AI Interview Platform</title>
    <style>
        body {
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .card {
            background:#1e293b;
            padding:40px;
            border-radius:12px;
            width:350px;
            text-align:center;
        }
        input {
            width:100%;
            padding:10px;
            margin-top:15px;
            border-radius:6px;
            border:none;
        }
        button {
            width:100%;
            margin-top:20px;
            padding:10px;
            background:#10b981;
            border:none;
            border-radius:6px;
            color:white;
            font-weight:bold;
        }
        a {
            color:#3b82f6;
            font-size:14px;
            display:block;
            margin-top:15px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Create Account</h2>
    <form method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <a href="/login">Already have an account? Login</a>
</div>
</body>
</html>
